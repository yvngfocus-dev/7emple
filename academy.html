<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>7EMPLE Academy</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Inter+Display:ital,opsz,wght@0,32..144,100..900;1,32..144,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e; --text: #F9F9F9; --muted: #767676;
      --dim: #3a3a3a; --surface: #181818;
      --border: rgba(249,249,249,0.08); --orange: #FE4C04;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; -webkit-font-smoothing: antialiased;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px;
      line-height: 1.6; cursor: none; overflow-x: hidden;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ── CURSOR ── */
    #cursor {
      position: fixed; left: 0; top: 0; width: 10px; height: 10px; border-radius: 50%;
      background: #fff; mix-blend-mode: difference; pointer-events: none; z-index: 99999;
      will-change: transform;
      transition: width .22s cubic-bezier(.16,1,.3,1), height .22s cubic-bezier(.16,1,.3,1), opacity .4s;
      opacity: 0;
    }
    #cursor.is-pointer { width: 20px; height: 20px; }

    /* ── GRAIN ── */
    #grain { position: fixed; inset: 0; width: 100%; height: 100%;
             pointer-events: none; z-index: 10001; opacity: 0.015;
             mix-blend-mode: screen; image-rendering: pixelated; }

    /* ── BACK ── */
    .back {
      position: fixed; top: 32px; left: 40px; z-index: 100;
      font-size: 11px; color: var(--muted); letter-spacing: .08em;
      display: flex; align-items: center; gap: 8px;
      transition: color .2s;
    }
    .back:hover { color: var(--text); }

    /* ── MAIN ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 80px 40px;
    }
    .center { max-width: 560px; width: 100%; text-align: center; }

    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--orange);
      margin-bottom: 28px;
      opacity: 0; transform: translateY(12px);
      transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);
    }
    .eyebrow.show { opacity: 1; transform: translateY(0); }

    .hed {
      font-family: 'Inter Display', sans-serif;
      font-size: clamp(52px, 10vw, 88px);
      font-weight: 800; letter-spacing: -.05em; line-height: .92;
      margin-bottom: 28px;
      opacity: 0; transform: translateY(16px);
      transition: opacity .9s cubic-bezier(.16,1,.3,1) .08s, transform .9s cubic-bezier(.16,1,.3,1) .08s;
    }
    .hed.show { opacity: 1; transform: translateY(0); }
    .hed em { font-style: italic; font-weight: 200; letter-spacing: -.06em; }

    .sub {
      font-size: 16px; color: var(--muted); line-height: 1.7;
      margin-bottom: 48px;
      opacity: 0; transform: translateY(12px);
      transition: opacity .9s cubic-bezier(.16,1,.3,1) .16s, transform .9s cubic-bezier(.16,1,.3,1) .16s;
    }
    .sub.show { opacity: 1; transform: translateY(0); }

    /* ── FORM ── */
    .form-wrap {
      opacity: 0; transform: translateY(12px);
      transition: opacity .9s cubic-bezier(.16,1,.3,1) .24s, transform .9s cubic-bezier(.16,1,.3,1) .24s;
    }
    .form-wrap.show { opacity: 1; transform: translateY(0); }

    .form-row {
      display: flex; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 6px 6px 20px;
      transition: border-color .2s;
    }
    .form-row:focus-within { border-color: rgba(249,249,249,.2); }
    .form-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Inter', sans-serif; font-size: 14px;
      color: var(--text); min-width: 0;
    }
    .form-input::placeholder { color: var(--dim); }
    .form-btn {
      background: var(--orange); color: #fff; border: none;
      border-radius: 6px; padding: 10px 20px; flex-shrink: 0;
      font-family: 'Inter', sans-serif; font-size: 12px;
      font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      cursor: none; transition: background .2s;
      white-space: nowrap;
    }
    .form-btn:hover { background: #e04400; }
    .form-note {
      font-size: 12px; color: var(--dim); margin-top: 14px;
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px 40px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; transition: opacity 1s .4s;
    }
    footer.show { opacity: 1; }
    .f-copy { font-size: 12px; color: var(--dim); }
    .f-site { font-size: 12px; color: var(--muted); transition: color .2s; }
    .f-site:hover { color: var(--text); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      html, body { cursor: auto; }
      #cursor { display: none; }
      .back { top: 20px; left: 20px; }
      main { padding: 100px 24px 60px; }
      .form-row { flex-direction: column; padding: 12px 16px; gap: 12px; border-radius: 8px; }
      .form-btn { width: 100%; padding: 12px; text-align: center; }
      footer { padding: 20px 24px; }
    }
  </style>
</head>
<body>
<div id="cursor"></div>
<canvas id="grain"></canvas>

<a href="/" class="back">← 7EMPLE</a>

<main>
  <div class="center">
    <div class="eyebrow" id="ey">7EMPLE Academy</div>
    <h1 class="hed" id="hd"><em>Something's</em><br>coming.</h1>
    <p class="sub" id="sb">Everything we know about building brands that grow — strategy, video, personal brand, conversion — turned into a proper curriculum. Taught from real campaigns. Zero filler.</p>

    <div class="form-wrap" id="fw">
      <form id="acForm">
        <div class="form-row">
          <input class="form-input" type="email" name="email" placeholder="Your email" required>
          <button class="form-btn" type="submit">I'm in</button>
        </div>
      </form>
      <p class="form-note">First to know. First access. No noise.</p>
    </div>
  </div>
</main>

<footer id="ft">
  <span class="f-copy">© 7EMPLE <span id="yr"></span></span>
  <a href="/" class="f-site">7emple.com ↗</a>
</footer>

<script>
// Grain
(function() {
  const c = document.createElement('canvas');
  c.id = 'grain'; const GW = 700, GH = 450; c.width = GW; c.height = GH;
  document.body.appendChild(c); const ctx = c.getContext('2d');
  const GFRAMES = 4; const gFrames = [];
  for (let f = 0; f < GFRAMES; f++) {
    const img = ctx.createImageData(GW, GH); const d = img.data;
    for (let i = 0; i < d.length; i += 4) { const v=(Math.random()*255)|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
    gFrames.push(img);
  }
  let last=0, gfi=0;
  (function draw(t) {
    if (document.hidden) { requestAnimationFrame(draw); return; }
    if (t-last>80) { last=t; ctx.putImageData(gFrames[gfi],0,0); gfi=(gfi+1)%GFRAMES; }
    requestAnimationFrame(draw);
  })(0);
})();

// Entrance
requestAnimationFrame(() => {
  ['ey','hd','sb','fw'].forEach(id => document.getElementById(id).classList.add('show'));
  document.getElementById('ft').classList.add('show');
});

// Cursor
const cur = document.getElementById('cursor');
let _mx=0,_my=0,_cx=0,_cy=0;
document.addEventListener('mousemove', e => {
  _mx=e.clientX; _my=e.clientY; cur.style.opacity='1';
  cur.classList.toggle('is-pointer', !!document.elementFromPoint(_mx,_my)?.closest('a,button,input'));
});
document.addEventListener('mouseleave', () => cur.style.opacity='0');

// Year
document.getElementById('yr').textContent = new Date().getFullYear();

// Form
document.getElementById('acForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = this.querySelector('button');
  const input = this.querySelector('input');
  btn.textContent = "You're on the list";
  btn.style.background = '#1a5c2a';
  input.disabled = true;
  btn.disabled = true;
});

// RAF
(function raf(t) {
  if (!document.hidden) {
    _cx+=(_mx-_cx)*0.2; _cy+=(_my-_cy)*0.2;
    cur.style.transform=`translate3d(${_cx}px,${_cy}px,0) translate(-50%,-50%)`;
  }
  requestAnimationFrame(raf);
})();
</script>
</body>
</html>
