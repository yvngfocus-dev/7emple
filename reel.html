<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>7EMPLE — Showreel</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #F9F9F9;
      --muted: #686868;
      --orange: #FE4C04;
      --border: rgba(249,249,249,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── CURSOR ── */
    #cursor {
      position: fixed; left: 0; top: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; mix-blend-mode: difference;
      pointer-events: none; z-index: 99999;
      will-change: transform;
      transition: width .22s cubic-bezier(.16,1,.3,1), height .22s cubic-bezier(.16,1,.3,1), opacity .4s;
      opacity: 0;
    }
    #cursor.expand { width: 56px; height: 56px; }

    /* ── GRAIN ── */
    #grain {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999;
      opacity: 0.018; mix-blend-mode: screen; image-rendering: pixelated;
    }

    /* ── VIDEO WRAPPER ── */
    #reel-wrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #reel-video {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(.16,1,.3,1);
    }
    #reel-video.loaded { opacity: 1; }

    /* Dark overlay so UI elements read clearly */
    #reel-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(10,10,10,0.1) 0%, rgba(10,10,10,0.55) 100%);
      pointer-events: none; z-index: 2;
    }

    /* Vignette edges */
    #reel-vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      box-shadow: inset 0 0 180px rgba(0,0,0,0.7);
    }

    /* ── PLACEHOLDER (shown when no video src) ── */
    #reel-placeholder {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }
    .ph-label {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
    }
    .ph-bar {
      width: 1px; height: 64px;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
    }

    /* ── LOGO ── */
    #reel-logo {
      position: fixed; top: 32px; left: 40px; z-index: 10;
      opacity: 0; transform: translateY(-8px);
      transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);
    }
    #reel-logo img { height: 26px; }
    #reel-logo.show { opacity: 1; transform: translateY(0); }

    /* ── BACK LINK ── */
    #reel-back {
      position: fixed; top: 32px; right: 40px; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      opacity: 0; transform: translateY(-8px);
      transition: opacity .8s cubic-bezier(.16,1,.3,1) .1s, transform .8s cubic-bezier(.16,1,.3,1) .1s, color .2s;
    }
    #reel-back:hover { color: var(--text); }
    #reel-back.show { opacity: 1; transform: translateY(0); }
    .back-arrow { font-size: 13px; }

    /* ── BOTTOM BAR ── */
    #reel-bottom {
      position: fixed; bottom: 32px; left: 40px; right: 40px; z-index: 10;
      display: flex; align-items: flex-end; justify-content: space-between;
      opacity: 0; transform: translateY(8px);
      transition: opacity .8s cubic-bezier(.16,1,.3,1) .2s, transform .8s cubic-bezier(.16,1,.3,1) .2s;
    }
    #reel-bottom.show { opacity: 1; transform: translateY(0); }

    .reel-title-block {}
    .reel-eyebrow { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--orange); font-weight: 500; margin-bottom: 6px; }
    .reel-title { font-size: clamp(28px, 4vw, 52px); font-weight: 800; letter-spacing: -.04em; line-height: 1; }
    .reel-title em { font-style: italic; font-weight: 300; }
    .reel-year { font-size: 11px; color: var(--muted); letter-spacing: .1em; margin-top: 10px; text-transform: uppercase; }

    /* Sound toggle */
    #sound-btn {
      display: flex; align-items: center; gap: 8px;
      background: rgba(249,249,249,0.06);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 18px;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); cursor: none;
      transition: background .2s, border-color .2s, color .2s;
      flex-shrink: 0;
    }
    #sound-btn:hover { background: rgba(249,249,249,0.1); border-color: rgba(249,249,249,0.2); color: var(--text); }
    #sound-btn.on { border-color: var(--orange); color: var(--orange); background: rgba(254,76,4,0.08); }
    .sound-icon { width: 14px; height: 10px; display: flex; align-items: flex-end; gap: 2px; }
    .sound-icon span {
      display: block; width: 2px; border-radius: 1px;
      background: currentColor;
      transition: height .3s cubic-bezier(.16,1,.3,1);
    }
    .sound-icon span:nth-child(1) { height: 4px; }
    .sound-icon span:nth-child(2) { height: 8px; }
    .sound-icon span:nth-child(3) { height: 6px; }
    .sound-icon span:nth-child(4) { height: 10px; }
    #sound-btn.on .sound-icon span:nth-child(1) { height: 6px; }
    #sound-btn.on .sound-icon span:nth-child(2) { height: 10px; }
    #sound-btn.on .sound-icon span:nth-child(3) { height: 8px; }
    #sound-btn.on .sound-icon span:nth-child(4) { height: 4px; }
    #sound-btn.muted .sound-icon span { height: 2px !important; }

    /* ── PROGRESS BAR ── */
    #reel-progress {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      height: 2px; background: rgba(249,249,249,0.08);
    }
    #reel-progress-fill {
      height: 100%; width: 0%;
      background: var(--orange);
      transition: width .1s linear;
    }

    /* ── PAGE ENTER/EXIT ── */
    #reel-page {
      opacity: 0;
      transition: opacity .6s cubic-bezier(.16,1,.3,1);
    }
    #reel-page.visible { opacity: 1; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { cursor: auto; }
      #cursor { display: none; }
      #reel-logo { top: 20px; left: 20px; }
      #reel-back { top: 20px; right: 20px; }
      #reel-bottom { bottom: 20px; left: 20px; right: 20px; }
      .reel-title { font-size: clamp(24px, 8vw, 40px); }
    }
  </style>
</head>
<body>
<div id="reel-page">

  <div id="cursor"></div>
  <canvas id="grain"></canvas>

  <!-- Video -->
  <div id="reel-wrap">
    <video id="reel-video" autoplay muted loop playsinline
           src=""
           poster="">
    </video>
  </div>

  <!-- Placeholder shown when no video loaded -->
  <div id="reel-placeholder">
    <div class="ph-bar"></div>
    <div class="ph-label">Reel coming soon</div>
    <div class="ph-bar"></div>
  </div>

  <!-- Overlays -->
  <div id="reel-overlay"></div>
  <div id="reel-vignette"></div>

  <!-- Logo -->
  <a href="/" id="reel-logo">
    <img src="/brand_assets/logo.png" alt="7EMPLE">
  </a>

  <!-- Back -->
  <a href="/" id="reel-back">
    <span class="back-arrow">←</span> Back to site
  </a>

  <!-- Bottom bar -->
  <div id="reel-bottom">
    <div class="reel-title-block">
      <div class="reel-eyebrow">7EMPLE</div>
      <div class="reel-title">Show<em>reel</em></div>
      <div class="reel-year">MMXXVI · Amsterdam</div>
    </div>
    <button id="sound-btn" aria-label="Toggle sound">
      <span class="sound-icon">
        <span></span><span></span><span></span><span></span>
      </span>
      <span id="sound-label">Sound off</span>
    </button>
  </div>

  <!-- Progress bar -->
  <div id="reel-progress"><div id="reel-progress-fill"></div></div>

</div>

<script>
// ── GRAIN ──
(function() {
  const c = document.createElement('canvas');
  c.id = 'grain';
  const GW = 700, GH = 450;
  c.width = GW; c.height = GH;
  document.body.appendChild(c);
  const ctx = c.getContext('2d');
  const GFRAMES = 4; const gFrames = [];
  for (let f = 0; f < GFRAMES; f++) {
    const img = ctx.createImageData(GW, GH); const d = img.data;
    for (let i = 0; i < d.length; i += 4) { const v = (Math.random()*255)|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
    gFrames.push(img);
  }
  let last = 0, gfi = 0;
  (function draw(t) {
    if (document.hidden) { requestAnimationFrame(draw); return; }
    if (t - last > 80) { last = t; ctx.putImageData(gFrames[gfi], 0, 0); gfi = (gfi+1) % GFRAMES; }
    requestAnimationFrame(draw);
  })(0);
})();

// ── CURSOR ──
const cur = document.getElementById('cursor');
let _mx = 0, _my = 0, _cx = 0, _cy = 0;
document.addEventListener('mousemove', e => {
  _mx = e.clientX; _my = e.clientY;
  cur.style.opacity = '1';
});
document.addEventListener('mouseleave', () => cur.style.opacity = '0');

// Expand cursor on interactive elements
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('expand'));
  el.addEventListener('mouseleave', () => cur.classList.remove('expand'));
});

// ── VIDEO ──
const video   = document.getElementById('reel-video');
const fill    = document.getElementById('reel-progress-fill');
const soundBtn   = document.getElementById('sound-btn');
const soundLabel = document.getElementById('sound-label');
const placeholder = document.getElementById('reel-placeholder');
let soundOn = false;

// Show video once it can play
video.addEventListener('canplay', () => {
  video.classList.add('loaded');
  placeholder.style.display = 'none';
});

// Progress bar
video.addEventListener('timeupdate', () => {
  if (video.duration) fill.style.width = (video.currentTime / video.duration * 100) + '%';
});

// Sound toggle
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  video.muted = !soundOn;
  soundBtn.classList.toggle('on', soundOn);
  soundBtn.classList.toggle('muted', !soundOn);
  soundLabel.textContent = soundOn ? 'Sound on' : 'Sound off';
  // Try to play with sound (browser may block until interaction)
  if (soundOn) video.play().catch(() => {});
});

// ── PAGE ENTRANCE ──
const page = document.getElementById('reel-page');
const logo = document.getElementById('reel-logo');
const back = document.getElementById('reel-back');
const bottom = document.getElementById('reel-bottom');

requestAnimationFrame(() => {
  page.classList.add('visible');
  setTimeout(() => logo.classList.add('show'), 300);
  setTimeout(() => back.classList.add('show'), 400);
  setTimeout(() => bottom.classList.add('show'), 500);
});

// ESC to exit
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.location.href = '/';
});

// ── RAF LOOP ──
function raf() {
  if (!document.hidden) {
    _cx += (_mx - _cx) * 0.18;
    _cy += (_my - _cy) * 0.18;
    cur.style.transform = `translate3d(${_cx}px,${_cy}px,0) translate(-50%,-50%)`;
  }
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);
</script>
</body>
</html>
